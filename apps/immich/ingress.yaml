apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: immich
  namespace: istio-ingress
spec:
  selector:
    istio: ingress
  servers:
    - hosts:
        - immich.local
      port:
        name: http
        number: 80
        protocol: HTTP
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: immich
  namespace: immich
spec:
  gateways:
    - istio-ingress/immich
  hosts:
    - immich.local
  http:
    - route:
        - destination:
            host: immich-server.immich.svc.cluster.local
            port:
              number: 2283

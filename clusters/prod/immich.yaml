apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  sources:
  - repoURL: https://github.com/jerryyf/home-ops.git
    targetRevision: feat/immich
    path: apps/immich
  - repoURL: oci://ghcr.io/immich-app/immich-charts/immich
    targetRevision: 0.12.0
    path: .
    helm:
      values: |
        immich:
          persistence:
            library:
              existingClaim: immich-pvc

        controllers:
          main:
            containers:
              main:
                image:
                  tag: v2.7.5
                env:
                  DB_HOSTNAME:
                    valueFrom:
                      secretKeyRef:
                        name: immich-pg-app
                        key: host
                  DB_USERNAME:
                    valueFrom:
                      secretKeyRef:
                        name: immich-pg-app
                        key: user
                  DB_PASSWORD:
                    valueFrom:
                      secretKeyRef:
                        name: immich-pg-app
                        key: password
                  DB_DATABASE_NAME:
                    valueFrom:
                      secretKeyRef:
                        name: immich-pg-app
                        key: dbname
                resources:
                  limits:
                    cpu: 200m
                    memory: 2Gi
                  requests:
                    cpu: 100m
                    memory: 500Mi

        valkey:
          enabled: true
